<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>鹿せんべいタッチ - 飛鳥荘</title>
<style>
  :root{
    --washi:#F7F0DF;
    --washi-deep:#EEE3C8;
    --forest:#2F4538;
    --forest-deep:#22332A;
    --torii:#C1440E;
    --torii-deep:#9A3409;
    --deer-fur:#C99A5B;
    --deer-fur-deep:#A97C42;
    --deer-belly:#F4E6C4;
    --ink:#3A2E25;
    --gold:#D6A21A;
    --cream-card:#FFFBF1;
    --shadow:rgba(40,30,20,0.28);
    --blush:#F2A89E;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; touch-action:none;
    font-family:"BIZ UDPGothic","Hiragino Maru Gothic ProN","Yu Gothic Rounded","Yu Gothic","Hiragino Sans",sans-serif;
    color:var(--ink);
    background:var(--forest-deep);
    -webkit-user-select:none; user-select:none;
  }

  #app{
    position:relative;
    width:100%;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  .screen{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    width:100%; height:100%;
  }
  .screen.active{ display:flex; }

  /* ============ 背景(共通の和の世界観) ============ */
  .bg{
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(120% 70% at 50% -10%, #FFF7E0 0%, var(--washi) 45%, var(--washi-deep) 100%);
    overflow:hidden;
  }
  .bg .hill{
    position:absolute; left:50%; bottom:-6%;
    width:140%; height:46%;
    transform:translateX(-50%);
    background:var(--forest);
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
    opacity:0.9;
  }
  .bg .hill.back{
    bottom:2%; width:170%; height:34%;
    background:var(--forest-deep);
    opacity:0.55;
  }
  .bg .torii{
    position:absolute; right:6%; bottom:26%;
    width:18%; max-width:90px; min-width:46px;
    opacity:0.5;
  }
  .bg .torii svg{ width:100%; display:block; }
  .bg .lantern{
    position:absolute; top:3%;
    width:11%; max-width:54px; min-width:30px;
    opacity:0.85;
  }
  .bg .lantern.left{ left:4%; }
  .bg .lantern.right{ right:4%; }
  .bg .lantern svg{ width:100%; display:block; }

  /* ============ タイトル画面 ============ */
  #screen-title .content{
    position:relative; z-index:1;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:5vh 6vw 4vh;
  }
  .eyebrow{
    font-size:clamp(0.85rem,2.6vw,1.1rem);
    letter-spacing:0.3em;
    color:var(--torii);
    font-weight:700;
    margin-top:1vh;
  }
  .title-main{
    text-align:center;
    line-height:1.15;
    font-weight:800;
    font-size:clamp(2.3rem,9.5vw,3.7rem);
    color:var(--ink);
    text-shadow:0 3px 0 var(--washi-deep);
    margin:0.4em 0 0;
  }
  .title-sub{
    text-align:center;
    font-size:clamp(1rem,3.4vw,1.3rem);
    color:var(--forest);
    font-weight:700;
    margin-top:0.3em;
    letter-spacing:0.05em;
  }

  .title-deer-wrap{
    width:clamp(230px,58vw,360px);
    margin:1vh 0;
  }

  .howto{
    display:flex; align-items:center; justify-content:center;
    gap:3vw;
    background:var(--cream-card);
    border:3px solid var(--washi-deep);
    border-radius:24px;
    padding:2.4vh 4vw;
    box-shadow:0 6px 0 var(--shadow);
    max-width:92vw;
  }
  .howto .step{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .howto .step-icon{ font-size:clamp(2rem,7vw,2.6rem); line-height:1; }
  .howto .step-label{ font-size:clamp(0.78rem,2.4vw,0.95rem); font-weight:700; color:var(--ink); }
  .howto .arrow{ font-size:clamp(1.4rem,4vw,1.8rem); color:var(--torii); font-weight:700; }

  .big-button{
    appearance:none; border:none; cursor:pointer;
    font-family:inherit; font-weight:800;
    color:#FFF8EC;
    background:linear-gradient(180deg,var(--torii) 0%, var(--torii-deep) 100%);
    border-radius:999px;
    padding:2.4vh 10vw;
    font-size:clamp(1.3rem,5.2vw,1.8rem);
    box-shadow:0 7px 0 var(--torii-deep), 0 10px 18px var(--shadow);
    letter-spacing:0.08em;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .big-button:active{
    transform:translateY(5px);
    box-shadow:0 2px 0 var(--torii-deep), 0 4px 10px var(--shadow);
  }
  .big-button.secondary{
    background:linear-gradient(180deg,#5A7763 0%, var(--forest) 100%);
    box-shadow:0 7px 0 var(--forest-deep), 0 10px 18px var(--shadow);
  }
  .big-button.secondary:active{
    box-shadow:0 2px 0 var(--forest-deep), 0 4px 10px var(--shadow);
  }

  /* ============ ゲーム画面 ============ */
  #screen-game .content{
    position:relative; z-index:1;
    width:100%; height:100%;
    display:flex; flex-direction:column;
  }
  .hud{
    display:flex; align-items:center; justify-content:center;
    gap:1.6vw; padding:3vh 0 0;
  }
  .hud .dot{
    width:clamp(10px,2.6vw,14px); height:clamp(10px,2.6vw,14px);
    border-radius:50%;
    background:var(--washi-deep);
    border:2px solid var(--deer-fur-deep);
    transition:background .25s ease, transform .25s ease;
  }
  .hud .dot.done{ background:var(--gold); transform:scale(1.15); }
  .hud .dot.current{ box-shadow:0 0 0 4px rgba(193,68,14,0.25); }

  .stage{
    position:relative;
    flex:1;
    width:100%;
    overflow:hidden;
  }

  #deerMover{
    position:absolute;
    left:50%; top:42%;
    transform:translate(-50%,-50%) translateX(130vw);
    transition:transform 1s cubic-bezier(.33,1.4,.6,1);
    z-index:2;
    will-change:transform;
  }
  .deer-wrap{
    position:relative;
    width:clamp(220px,58vw,380px);
  }
  .deer-wrap.hop{ animation:hopBounce .46s ease-in-out infinite; }
  @keyframes hopBounce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-5%); }
  }
  .deer-wrap.shake{ animation:shakeX .42s ease; }
  @keyframes shakeX{
    0%,100%{ transform:translateX(0) rotate(0); }
    20%{ transform:translateX(-3%) rotate(-3deg); }
    40%{ transform:translateX(3%) rotate(3deg); }
    60%{ transform:translateX(-2%) rotate(-2deg); }
    80%{ transform:translateX(2%) rotate(2deg); }
  }

  #deerHead{
    transform-box:fill-box;
    transform-origin:50% 100%;
    transition:transform .32s ease;
  }
  #deerHead.bow{ transform:translateY(7%) scale(1.02,0.86); }

  .ear{ transform-box:fill-box; transform-origin:50% 90%; transition:transform .32s ease; }
  #deerHead.bow .ear{ transform:rotate(16deg); }
  .ear.twitch{ animation:earTwitch 2.6s ease-in-out infinite; }
  @keyframes earTwitch{
    0%,100%{ transform:rotate(0deg); }
    50%{ transform:rotate(6deg); }
  }

  #deerTail{ transform-box:fill-box; transform-origin:70% 30%; }
  #deerTail.wag{ animation:tailWag .22s ease-in-out infinite alternate; }
  @keyframes tailWag{
    0%{ transform:rotate(-14deg); }
    100%{ transform:rotate(22deg); }
  }

  #eyesNormal, #eyesSurprised{ transform-box:fill-box; transform-origin:50% 50%; }
  #deerHead.bow #eyesNormal{ transform:scaleY(0.25); }
  #eyesSurprised{ display:none; }
  .deer-wrap.surprised #eyesNormal{ display:none; }
  .deer-wrap.surprised #eyesSurprised{ display:block; }

  #mouthClosed{ display:block; }
  #mouthOpen{ display:none; }
  .deer-wrap.eating #mouthClosed{ display:none; }
  .deer-wrap.eating #mouthOpen{ display:block; }

  .sparkles{
    position:absolute; inset:0;
    pointer-events:none;
    z-index:3;
  }
  .sparkle{
    position:absolute;
    font-size:clamp(1.4rem,5vw,2rem);
    opacity:0;
  }
  .sparkle.show{ animation:sparklePop .8s ease-out forwards; }
  @keyframes sparklePop{
    0%{ opacity:0; transform:translateY(0) scale(.4); }
    25%{ opacity:1; transform:translateY(-10px) scale(1.1); }
    100%{ opacity:0; transform:translateY(-46px) scale(1); }
  }

  .speech-bubble{
    position:absolute;
    top:-14%; left:50%;
    transform:translateX(-50%) scale(0);
    background:var(--cream-card);
    border:3px solid var(--ink);
    border-radius:18px;
    padding:0.5em 0.9em;
    font-weight:800;
    font-size:clamp(1.1rem,4.6vw,1.5rem);
    white-space:nowrap;
    transition:transform .25s cubic-bezier(.4,1.8,.6,1);
    z-index:4;
  }
  .speech-bubble.show{ transform:translateX(-50%) scale(1); }
  .speech-bubble::after{
    content:"";
    position:absolute; left:50%; bottom:-10px;
    transform:translateX(-50%);
    border:10px solid transparent;
    border-top-color:var(--ink);
  }

  .cracker-wrap{
    position:absolute;
    left:50%; bottom:9vh;
    transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center;
    gap:1vh;
    z-index:5;
  }
  #senbeiBtn{
    appearance:none; border:none; padding:0; cursor:pointer;
    width:clamp(150px,40vw,230px); height:clamp(150px,40vw,230px);
    border-radius:50%;
    position:relative;
    background:transparent;
    animation:breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.035); }
  }
  #senbeiBtn::before{
    content:"";
    position:absolute; inset:0;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #E3B36A, var(--deer-fur-deep) 75%);
    box-shadow:0 9px 0 #7C5A2C, 0 14px 22px var(--shadow), inset 0 -8px 14px rgba(0,0,0,0.18), inset 0 6px 10px rgba(255,255,255,0.25);
  }
  #senbeiBtn .speck{
    position:absolute;
    width:6%; height:9%;
    border-radius:50%;
    background:#5E4322;
    opacity:0.55;
  }
  #senbeiBtn:active{ transform:scale(0.94) !important; }
  #senbeiBtn.cue::after{
    content:"";
    position:absolute; inset:-14%;
    border-radius:50%;
    border:6px solid var(--gold);
    animation:cuePulse .55s ease-out infinite;
  }
  @keyframes cuePulse{
    0%{ transform:scale(0.9); opacity:0.9; }
    100%{ transform:scale(1.28); opacity:0; }
  }
  .cracker-hint{
    font-size:clamp(0.95rem,3.6vw,1.2rem);
    font-weight:800;
    color:var(--cream-card);
    background:rgba(58,46,37,0.55);
    padding:0.3em 0.9em;
    border-radius:999px;
    opacity:0;
    transition:opacity .2s ease;
  }
  .cracker-hint.show{ opacity:1; }

  .sound-toggle{
    position:absolute; top:2.6vh; right:3vw; z-index:10;
    width:clamp(40px,9vw,52px); height:clamp(40px,9vw,52px);
    border-radius:50%;
    border:none; background:rgba(255,255,255,0.55);
    font-size:clamp(1.1rem,4vw,1.4rem);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  /* ============ 結果画面 ============ */
  #screen-result .content{
    position:relative; z-index:1;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding:6vh 6vw 5vh;
    text-align:center;
  }
  .result-rank{
    font-size:clamp(1rem,3.4vw,1.2rem);
    font-weight:700;
    color:var(--forest);
    letter-spacing:0.1em;
  }
  .result-title{
    font-size:clamp(2.1rem,8.4vw,3.2rem);
    font-weight:800;
    color:var(--ink);
    margin:0.3em 0;
    text-shadow:0 3px 0 var(--washi-deep);
  }
  .result-stars{
    display:flex; gap:2vw; justify-content:center;
    font-size:clamp(2.2rem,8vw,3rem);
    margin:1.5vh 0;
  }
  .result-stars .star{ opacity:0.25; transition:opacity .25s ease, transform .25s ease; }
  .result-stars .star.lit{ opacity:1; transform:scale(1.12); }
  .result-deer-wrap{ width:clamp(200px,50vw,300px); margin:1vh 0; }
  .result-score{
    font-size:clamp(1.1rem,4vw,1.4rem);
    font-weight:700;
    color:var(--ink);
    background:var(--cream-card);
    border:3px solid var(--washi-deep);
    border-radius:16px;
    padding:1.2vh 6vw;
  }
  .result-buttons{ display:flex; flex-direction:column; gap:1.4vh; width:100%; align-items:center; }

  @media (prefers-reduced-motion:reduce){
    .deer-wrap.hop, .ear.twitch, #senbeiBtn, #senbeiBtn.cue::after { animation:none !important; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ タイトル画面 ============ -->
  <div class="screen active" id="screen-title">
    <div class="bg">
      <div class="hill back"></div>
      <div class="hill"></div>
      <div class="torii">
        <svg viewBox="0 0 100 140"><g fill="#2F4538"><rect x="8" y="30" width="84" height="10"/><rect x="6" y="22" width="88" height="9" rx="3"/><rect x="18" y="32" width="11" height="100"/><rect x="71" y="32" width="11" height="100"/><rect x="40" y="55" width="20" height="9"/></g></svg>
      </div>
      <div class="lantern left">
        <svg viewBox="0 0 60 100"><g><rect x="26" y="0" width="8" height="10" fill="#5E4322"/><ellipse cx="30" cy="46" rx="26" ry="36" fill="#C1440E"/><rect x="10" y="40" width="40" height="12" fill="#5E4322" opacity="0.5"/><rect x="26" y="82" width="8" height="14" fill="#5E4322"/></g></svg>
      </div>
      <div class="lantern right">
        <svg viewBox="0 0 60 100"><g><rect x="26" y="0" width="8" height="10" fill="#5E4322"/><ellipse cx="30" cy="46" rx="26" ry="36" fill="#C1440E"/><rect x="10" y="40" width="40" height="12" fill="#5E4322" opacity="0.5"/><rect x="26" y="82" width="8" height="14" fill="#5E4322"/></g></svg>
      </div>
    </div>

    <div class="content">
      <div style="text-align:center;">
        <div class="eyebrow">飛鳥荘 ・ 奈良公園</div>
        <h1 class="title-main">鹿せんべい<br>タッチ</h1>
        <div class="title-sub">おじぎした鹿に せんべいをあげよう</div>
      </div>

      <div class="title-deer-wrap" id="titleDeerHolder"></div>

      <div class="howto">
        <div class="step">
          <div class="step-icon">🦌🙇</div>
          <div class="step-label">おじぎしたら</div>
        </div>
        <div class="arrow">→</div>
        <div class="step">
          <div class="step-icon">👆</div>
          <div class="step-label">タップ!</div>
        </div>
      </div>

      <button class="big-button" id="startBtn">はじめる</button>
    </div>
  </div>

  <!-- ============ ゲーム画面 ============ -->
  <div class="screen" id="screen-game">
    <div class="bg">
      <div class="hill back"></div>
      <div class="hill"></div>
      <div class="torii">
        <svg viewBox="0 0 100 140"><g fill="#2F4538"><rect x="8" y="30" width="84" height="10"/><rect x="6" y="22" width="88" height="9" rx="3"/><rect x="18" y="32" width="11" height="100"/><rect x="71" y="32" width="11" height="100"/><rect x="40" y="55" width="20" height="9"/></g></svg>
      </div>
    </div>

    <button class="sound-toggle" id="soundBtn">🔊</button>

    <div class="content">
      <div class="hud" id="hud"></div>

      <div class="stage" id="stage">
        <div id="deerMover">
          <div class="deer-wrap" id="deerWrap"></div>
          <div class="speech-bubble" id="speechBubble"></div>
          <div class="sparkles" id="sparkles"></div>
        </div>

        <div class="cracker-wrap">
          <div class="cracker-hint" id="crackerHint">いまだ!</div>
          <button id="senbeiBtn" aria-label="せんべいをあげる">
            <div class="speck" style="top:30%; left:28%;"></div>
            <div class="speck" style="top:55%; left:60%;"></div>
            <div class="speck" style="top:65%; left:30%;"></div>
            <div class="speck" style="top:25%; left:62%;"></div>
            <div class="speck" style="top:48%; left:46%;"></div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ 結果画面 ============ -->
  <div class="screen" id="screen-result">
    <div class="bg">
      <div class="hill back"></div>
      <div class="hill"></div>
    </div>
    <div class="content">
      <div>
        <div class="result-rank">けっか</div>
        <div class="result-title" id="resultTitle">鹿せんべい名人</div>
        <div class="result-stars" id="resultStars"></div>
      </div>

      <div class="result-deer-wrap" id="resultDeerHolder"></div>

      <div style="display:flex; flex-direction:column; align-items:center; gap:2.2vh; width:100%;">
        <div class="result-score" id="resultScore">6頭中 5頭に わたせた!</div>
        <div class="result-buttons">
          <button class="big-button" id="retryBtn">もう一度遊ぶ</button>
          <button class="big-button secondary" id="titleBtn">タイトルへ</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ===================================================================
     鹿のSVGを生成する(タイトル/ゲーム/結果の3か所で共通利用)
  =================================================================== */
  function buildDeerSVG(){
    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns,"svg");
    svg.setAttribute("viewBox","0 0 300 300");
    svg.setAttribute("width","100%");
    svg.style.display = "block";
    svg.style.overflow = "visible";

    svg.innerHTML = `
      <ellipse cx="150" cy="262" rx="72" ry="13" fill="rgba(40,30,20,0.20)"></ellipse>

      <g id="deerBody">
        <rect x="118" y="232" width="15" height="26" rx="6" fill="#A97C42"></rect>
        <rect x="167" y="232" width="15" height="26" rx="6" fill="#A97C42"></rect>

        <g id="deerTail">
          <circle cx="218" cy="196" r="15" fill="#F4E6C4"></circle>
        </g>

        <ellipse cx="150" cy="195" rx="80" ry="62" fill="#C99A5B"></ellipse>
        <ellipse cx="150" cy="220" rx="46" ry="36" fill="#F4E6C4"></ellipse>
        <ellipse cx="112" cy="152" rx="9" ry="6" fill="#F4E6C4" opacity="0.85"></ellipse>
        <ellipse cx="190" cy="150" rx="9" ry="6" fill="#F4E6C4" opacity="0.85"></ellipse>
        <ellipse cx="150" cy="138" rx="8" ry="5" fill="#F4E6C4" opacity="0.85"></ellipse>

        <g id="deerHead">
          <g class="ear twitch" id="earL" style="transform:rotate(-18deg);">
            <ellipse cx="103" cy="98" rx="19" ry="28" fill="#C99A5B"></ellipse>
            <ellipse cx="103" cy="100" rx="10" ry="17" fill="#F4E6C4"></ellipse>
          </g>
          <g class="ear twitch" id="earR" style="transform:rotate(18deg);">
            <ellipse cx="197" cy="98" rx="19" ry="28" fill="#C99A5B"></ellipse>
            <ellipse cx="197" cy="100" rx="10" ry="17" fill="#F4E6C4"></ellipse>
          </g>

          <path d="M124,72 Q118,52 130,46 Q126,62 134,72 Z" fill="#A97C42"></path>
          <path d="M176,72 Q182,52 170,46 Q174,62 166,72 Z" fill="#A97C42"></path>

          <circle cx="150" cy="138" r="58" fill="#C99A5B"></circle>
          <ellipse cx="150" cy="163" rx="32" ry="23" fill="#F4E6C4"></ellipse>

          <circle cx="119" cy="148" r="9" fill="#F2A89E" opacity="0.55"></circle>
          <circle cx="181" cy="148" r="9" fill="#F2A89E" opacity="0.55"></circle>

          <g id="eyesNormal">
            <circle cx="128" cy="128" r="8" fill="#3A2E25"></circle>
            <circle cx="172" cy="128" r="8" fill="#3A2E25"></circle>
            <circle cx="125" cy="125" r="2.4" fill="#FFFFFF"></circle>
            <circle cx="169" cy="125" r="2.4" fill="#FFFFFF"></circle>
          </g>
          <g id="eyesSurprised">
            <path d="M121,122 L135,134 M135,122 L121,134" stroke="#3A2E25" stroke-width="4" stroke-linecap="round"></path>
            <path d="M165,122 L179,134 M179,122 L165,134" stroke="#3A2E25" stroke-width="4" stroke-linecap="round"></path>
          </g>

          <ellipse cx="150" cy="158" rx="7" ry="5" fill="#3A2E25"></ellipse>

          <path id="mouthClosed" d="M138,174 Q150,180 162,174" stroke="#3A2E25" stroke-width="4" fill="none" stroke-linecap="round"></path>
          <ellipse id="mouthOpen" cx="150" cy="176" rx="11" ry="9" fill="#7A4B33"></ellipse>
        </g>
      </g>
    `;
    return svg;
  }

  /* ===================================================================
     状態管理
  =================================================================== */
  const TOTAL_DEER = 6;
  const WALK_DURATION = 1000;
  const WAIT_MIN = 700, WAIT_MAX = 1400;
  const BOW_RISE = 950;
  const EXIT_DURATION = 750;

  const state = {
    deerIndex: 0,
    score: 0,
    phase: "none",
    bowStartedAt: 0,
    timers: [],
    soundOn: true
  };

  function clearTimers(){
    state.timers.forEach(t => clearTimeout(t));
    state.timers = [];
  }
  function after(ms, fn){
    const id = setTimeout(fn, ms);
    state.timers.push(id);
    return id;
  }

  /* ===================================================================
     画面切り替え
  =================================================================== */
  const screens = {
    title: document.getElementById("screen-title"),
    game: document.getElementById("screen-game"),
    result: document.getElementById("screen-result")
  };
  function showScreen(name){
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  /* ===================================================================
     サウンド(簡易・効果音のみ。外部ファイル不要)
  =================================================================== */
  let audioCtx = null;
  function ensureAudio(){
    if (!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; }
    }
  }
  function beep(freqs, dur){
    if (!state.soundOn) return;
    ensureAudio();
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    freqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = f;
      gain.gain.value = 0.0001;
      osc.connect(gain); gain.connect(audioCtx.destination);
      const t0 = now + i * dur;
      gain.gain.exponentialRampToValueAtTime(0.18, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    });
  }
  function playSuccessSound(){ beep([660, 880], 0.14); }
  function playFailSound(){ beep([300, 210], 0.16); }

  /* ===================================================================
     タイトル / 結果画面の鹿(静止・装飾用)
  =================================================================== */
  const titleDeer = buildDeerSVG();
  document.getElementById("titleDeerHolder").appendChild(titleDeer);
  titleDeer.querySelector("#deerHead").classList.add("bow");

  const resultDeer = buildDeerSVG();
  document.getElementById("resultDeerHolder").appendChild(resultDeer);

  /* ===================================================================
     ゲーム画面の鹿(動かす本体)
  =================================================================== */
  const deerWrap = document.getElementById("deerWrap");
  const gameDeerSVG = buildDeerSVG();
  deerWrap.appendChild(gameDeerSVG);
  const deerMover = document.getElementById("deerMover");
  const deerHead = gameDeerSVG.querySelector("#deerHead");
  const deerTail = gameDeerSVG.querySelector("#deerTail");
  const speechBubble = document.getElementById("speechBubble");
  const sparklesLayer = document.getElementById("sparkles");
  const senbeiBtn = document.getElementById("senbeiBtn");
  const crackerHint = document.getElementById("crackerHint");
  const hud = document.getElementById("hud");
  const soundBtn = document.getElementById("soundBtn");

  function setSpeech(text, show){
    speechBubble.textContent = text;
    speechBubble.classList.toggle("show", !!show);
  }

  function popSparkles(){
    sparklesLayer.innerHTML = "";
    const glyphs = ["✨","💕","⭐"];
    for (let i=0;i<5;i++){
      const el = document.createElement("div");
      el.className = "sparkle";
      el.textContent = glyphs[i % glyphs.length];
      el.style.left = (15 + Math.random()*60) + "%";
      el.style.top = (10 + Math.random()*30) + "%";
      sparklesLayer.appendChild(el);
      requestAnimationFrame(() => el.classList.add("show"));
    }
  }

  /* ===================================================================
     HUD(進行状況ドット)
  =================================================================== */
  function buildHud(){
    hud.innerHTML = "";
    for (let i=0;i<TOTAL_DEER;i++){
      const d = document.createElement("div");
      d.className = "dot";
      hud.appendChild(d);
    }
  }
  function updateHud(){
    const dots = hud.querySelectorAll(".dot");
    dots.forEach((d, i) => {
      d.classList.toggle("done", i < state.score);
      d.classList.toggle("current", i === state.deerIndex);
    });
  }

  /* ===================================================================
     ゲーム進行ロジック
  =================================================================== */
  function startGame(){
    state.deerIndex = 0;
    state.score = 0;
    clearTimers();
    buildHud();
    showScreen("game");
    after(150, spawnDeer);
  }

  function resetDeerVisual(){
    deerWrap.className = "deer-wrap";
    deerHead.classList.remove("bow");
    deerTail.classList.remove("wag");
    setSpeech("", false);
    sparklesLayer.innerHTML = "";
    senbeiBtn.classList.remove("cue");
    crackerHint.classList.remove("show");
  }

  function spawnDeer(){
    if (state.deerIndex >= TOTAL_DEER){ return finishGame(); }
    state.phase = "walkin";
    resetDeerVisual();
    updateHud();

    deerMover.style.transition = "none";
    deerMover.style.transform = "translate(-50%,-50%) translateX(130vw)";
    deerWrap.classList.add("hop");

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        deerMover.style.transition = "transform 1s cubic-bezier(.33,1.4,.6,1)";
        deerMover.style.transform = "translate(-50%,-50%) translateX(0)";
      });
    });

    after(WALK_DURATION, () => {
      deerWrap.classList.remove("hop");
      state.phase = "wait";
      const waitTime = WAIT_MIN + Math.random()*(WAIT_MAX-WAIT_MIN);
      after(waitTime, startBow);
    });
  }

  function startBow(){
    state.phase = "bow";
    state.bowStartedAt = Date.now();
    deerHead.classList.add("bow");
    senbeiBtn.classList.add("cue");
    crackerHint.classList.add("show");
    setSpeech("ぺこり", true);

    after(BOW_RISE, () => {
      if (state.phase === "bow"){
        // タップされずに見送り(ペナルティなし)
        endEncounter(false, true);
      }
    });
  }

  function endEncounter(success, missedQuietly){
    senbeiBtn.classList.remove("cue");
    crackerHint.classList.remove("show");

    if (success){
      state.phase = "success";
      state.score++;
      deerWrap.classList.add("eating");
      deerTail.classList.add("wag");
      setSpeech("ありがとう!", true);
      popSparkles();
      playSuccessSound();
    } else if (missedQuietly){
      state.phase = "miss";
      deerHead.classList.remove("bow");
      setSpeech("また今度ね", true);
    } else {
      state.phase = "fail";
      deerHead.classList.remove("bow");
      deerWrap.classList.add("surprised", "shake");
      setSpeech("びっくり!", true);
      playFailSound();
    }

    updateHud();
    after(success ? 1050 : 750, walkOut);
  }

  function walkOut(){
    state.phase = "walkout";
    deerWrap.classList.add("hop");
    deerMover.style.transition = "transform " + (EXIT_DURATION/1000) + "s ease-in";
    deerMover.style.transform = "translate(-50%,-50%) translateX(-130vw)";

    after(EXIT_DURATION, () => {
      state.deerIndex++;
      spawnDeer();
    });
  }

  function onSenbeiTap(){
    ensureAudio();
    if (state.phase === "bow"){
      const elapsed = Date.now() - state.bowStartedAt;
      if (elapsed >= 80){
        endEncounter(true, false);
      }
    } else if (state.phase === "walkin" || state.phase === "wait"){
      endEncounter(false, false);
    }
    // success/fail/walkout/miss 中のタップは無視(暴打ち対策)
  }

  senbeiBtn.addEventListener("pointerdown", function(e){
    e.preventDefault();
    onSenbeiTap();
  });

  /* ===================================================================
     結果画面
  =================================================================== */
  function finishGame(){
    clearTimers();
    const score = state.score;
    let title, rankClass;
    if (score <= 2){ title = "鹿見習い"; }
    else if (score <= 4){ title = "鹿せんべい上手"; }
    else { title = "鹿せんべい名人"; }

    document.getElementById("resultTitle").textContent = title;
    document.getElementById("resultScore").textContent = TOTAL_DEER + "頭中 " + score + "頭に わたせた!";

    const starsHolder = document.getElementById("resultStars");
    starsHolder.innerHTML = "";
    for (let i=0;i<TOTAL_DEER;i++){
      const s = document.createElement("span");
      s.className = "star" + (i < score ? " lit" : "");
      s.textContent = "⭐";
      starsHolder.appendChild(s);
    }

    resultDeer.querySelector("#deerHead").classList.toggle("bow", score >= 5);
    showScreen("result");
  }

  /* ===================================================================
     ボタン類
  =================================================================== */
  document.getElementById("startBtn").addEventListener("click", () => {
    ensureAudio();
    startGame();
  });
  document.getElementById("retryBtn").addEventListener("click", startGame);
  document.getElementById("titleBtn").addEventListener("click", () => {
    clearTimers();
    showScreen("title");
  });
  soundBtn.addEventListener("click", () => {
    state.soundOn = !state.soundOn;
    soundBtn.textContent = state.soundOn ? "🔊" : "🔇";
  });

})();
</script>
</body>
</html>
